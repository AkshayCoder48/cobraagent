<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- CobraAgent 2D logo — built by OnyxAi -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Cobra hood (left curve) -->
  <path d="M32 18 C 24 10, 14 12, 12 20 C 11 26, 16 30, 22 28 C 26 27, 28 24, 30 22"
        fill="#ffffff" opacity="0.95"/>
  <!-- Cobra head -->
  <ellipse cx="30" cy="22" rx="5" ry="4" fill="#ffffff"/>
  <!-- Cobra eye -->
  <circle cx="28" cy="21" r="1.2" fill="#0f172a"/>
  <!-- Cobra tongue (forked) -->
  <path d="M26 23 L 20 24 M 26 23 L 20 22" stroke="#ef4444" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <!-- Cobra body (S-curve) -->
  <path d="M32 26 C 28 32, 24 36, 26 42 C 28 48, 34 50, 40 46"
        stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Cobra tail -->
  <path d="M40 46 C 46 44, 50 40, 48 34"
        stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>
</svg>
